<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do list</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">

        <div class="title">
            <h1>Your To Do </h1>
            <button id="mode">🌙</button>
        </div>
        
        <div class="box">
            <input type="text" id="todo" placeholder="Add new task">
            <button id="add">+</button>
        </div>

        <p id="suggestion"></p>
        
        <p id="taskcount"></p>

        <div id="showlist"></div>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
